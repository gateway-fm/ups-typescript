name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-artifacts
          path: packages/*/dist

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./coverage/coverage-final.json
  # e2e:
  #     runs-on: ubuntu-latest
  #     needs: build
  #     if: github.ref == 'refs/heads/main'
  #     steps:
  #         - uses: actions/checkout@v4
  #         - uses: pnpm/action-setup@v3
  #           with:
  #               version: 9
  #         - uses: actions/setup-node@v4
  #           with:
  #               node-version: "20"
  #               cache: "pnpm"
  #         - run: pnpm install --frozen-lockfile
  #         - run: pnpm test:e2e
  #           env:
  #               API_BASE_URL: ${{ secrets.API_BASE_URL }}
  #               BLOCKCHAIN_RPC_URL: ${{ secrets.BLOCKCHAIN_RPC_URL }}
  #               BLOCKCHAIN_CHAIN_ID: ${{ secrets.BLOCKCHAIN_CHAIN_ID }}
  #               BLOCKCHAIN_PAYMENT_TOKEN_ADDRESS: ${{ secrets.BLOCKCHAIN_PAYMENT_TOKEN_ADDRESS }}
  #               TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}

  release:
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump Version
        id: version_bump
        if: "!contains(github.event.head_commit.message, 'skip ci')"
        run: |
          pnpm version patch --no-git-tag-version
          pnpm -r exec npm version patch --no-git-tag-version
          git commit -am "chore(release): bump version [skip ci]"
          TAG="v$(node -p "require('./package.json').version")"
          git tag "$TAG"
          git push && git push --tags
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT

      - name: Build
        run: pnpm build

      - name: Publish to NPM
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          pnpm -r publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_JS_TOKEN_PUBLISH }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: steps.version_bump.outputs.tag_name
        with:
          tag_name: ${{ steps.version_bump.outputs.tag_name }}
          name: Release ${{ steps.version_bump.outputs.tag_name }}
          generate_release_notes: true
